name: HealthSense Unified E2E & Security Test Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify_deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Web Demo HTML Presence
        run: |
          if [ ! -f "cybershield_demo.html" ]; then
            echo "Error: cybershield_demo.html not found!"
            exit 1
          fi
          echo "Deployment Verification Successful: cybershield_demo.html is present."

  run_backend_api_tests:
    name: Run Backend API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pytest Appium-Python-Client selenium

      - name: Run Security Scanner
        run: |
          python tests-e2e/security_scanner.py > security_output.log
          # Run python scan programmatically to output findings JSON
          python -c "import json; import sys; sys.path.append('tests-e2e'); import security_scanner; findings, counts = security_scanner.scan_android_project(); print(json.dumps({'findings': findings, 'counts': counts}))" > security_results.json

      - name: Upload Security Results
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: security_results.json

  run_frontend_build:
    name: Run Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build / Check Web Files
        run: |
          echo "Building/Verifying frontend static bundle..."
          # Do a HTML formatting/syntax check or simple validation
          grep -q "<title>CyberShield" cybershield_demo.html || exit 1
          echo "Frontend build verification successful!"

  run_api_load_tests:
    name: Run API Load Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run API Load Test
        run: |
          python -c "import json; import sys; sys.path.append('tests-e2e'); import load_tester; stats = load_tester.execute(); print(json.dumps(stats))" > load_stats.json

      - name: Upload Load Stats Results
        uses: actions/upload-artifact@v4
        with:
          name: load-stats-results
          path: load_stats.json

  run_selenium_e2e_tests:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: verify_deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Selenium & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pytest Appium-Python-Client selenium

      - name: Run E2E Test Suite (Headless Chrome & Mock Appium)
        run: |
          # We run pytest using run_tests.py with dry-run since Appium is not active in standard GitHub runner
          python -c "import json; import sys; sys.path.append('tests-e2e'); import pytest; from run_tests import ResultCollectorPlugin; c = ResultCollectorPlugin(); pytest.main(['-v', 'tests-e2e/test_web.py', 'tests-e2e/test_mobile.py', '--dry-run'], plugins=[c]); print(json.dumps(c.results))" > e2e_results.json

      - name: Upload E2E Results
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e_results.json

  consolidate_verify_reports:
    name: Consolidate & Verify Reports
    runs-on: ubuntu-latest
    needs: [run_backend_api_tests, run_frontend_build, run_api_load_tests, run_selenium_e2e_tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pytest Appium-Python-Client selenium

      - name: Download Security Results
        uses: actions/download-artifact@v4
        with:
          name: security-results

      - name: Download Load Stats
        uses: actions/download-artifact@v4
        with:
          name: load-stats-results

      - name: Download E2E Results
        uses: actions/download-artifact@v4
        with:
          name: e2e-results

      - name: Run Consolidation Script
        run: |
          # Running consolidate_reports.py which will read downloaded JSON files and compile into summary
          python tests-e2e/consolidate_reports.py

      - name: Upload Website E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: website-e2e-report
          path: website/*.xlsx

      - name: Upload Mobile E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-report
          path: mobile/report/*.xlsx

      - name: Upload Security Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-report
          path: backend/*.xlsx

      - name: Upload Load Testing Report
        uses: actions/upload-artifact@v4
        with:
          name: load-testing-report
          path: load_testing/*.xlsx
