<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield | Real-time Bullying Protection Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0b0f19;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --cyan-accent: #06b6d4;
            --purple-accent: #8b5cf6;
            --amber-accent: #f59e0b;
            --rose-accent: #f43f5e;
            --light-text: #f8fafc;
            --muted-text: #94a3b8;
            --glow-cyan: rgba(6, 182, 212, 0.15);
            --glow-purple: rgba(139, 92, 246, 0.15);
            --glow-rose: rgba(244, 63, 94, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 24px;
        }

        /* Glowing background effects */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
        }

        body::before {
            top: -100px;
            left: -100px;
            background: var(--purple-accent);
        }

        body::after {
            bottom: -100px;
            right: -100px;
            background: var(--cyan-accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header design */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--purple-accent), var(--cyan-accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .logo-text h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 11px;
            color: var(--muted-text);
            font-weight: 500;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--cyan-accent);
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--glow-cyan);
            animation: pulse 2s infinite;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--cyan-accent);
            border-radius: 50%;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* Two-column layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Card styles */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--light-text);
            border-left: 3px solid var(--purple-accent);
            padding-left: 10px;
        }

        /* Forms and Controls */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted-text);
        }

        input[type="text"], input[type="tel"], input[type="email"], textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: var(--light-text);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--purple-accent);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, var(--purple-accent), #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--light-text);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted-text);
            font-size: 12px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--light-text);
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sensitivity slider */
        .sensitivity-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px;
            border-radius: 10px;
        }

        .sens-btn {
            background: transparent;
            border: none;
            color: var(--muted-text);
            padding: 8px;
            font-weight: 700;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sens-btn.active {
            background: var(--purple-accent);
            color: white;
        }

        /* Severity progress bar */
        .severity-bar-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .severity-bar {
            height: 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            overflow: hidden;
        }

        .sev-segment {
            height: 100%;
            transition: width 0.3s ease;
        }

        .sev-critical { background-color: var(--rose-accent); }
        .sev-high { background-color: var(--amber-accent); }
        .sev-medium { background-color: var(--purple-accent); }
        .sev-low { background-color: var(--cyan-accent); }

        .legend {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--muted-text);
            font-weight: 600;
            flex-wrap: wrap;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Incident List layout */
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-btn {
            font-size: 12px;
            color: var(--rose-accent);
            cursor: pointer;
            font-weight: 700;
        }

        .incident-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Custom Scrollbar */
        .incident-list::-webkit-scrollbar {
            width: 6px;
        }
        .incident-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        .incident-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .incident-row {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .incident-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sender-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
        }

        .sender-name {
            font-size: 14px;
            font-weight: 700;
        }

        .app-name {
            font-size: 11px;
            color: var(--muted-text);
        }

        .badge {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .badge-critical { background: rgba(244, 63, 94, 0.15); color: var(--rose-accent); }
        .badge-high { background: rgba(245, 158, 11, 0.15); color: var(--amber-accent); }
        .badge-medium { background: rgba(139, 92, 246, 0.15); color: var(--purple-accent); }
        .badge-low { background: rgba(6, 182, 212, 0.15); color: var(--cyan-accent); }

        .time-text {
            font-size: 10px;
            color: var(--muted-text);
            margin-top: 4px;
            text-align: right;
        }

        .message-box {
            background: rgba(11, 15, 25, 0.5);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.5;
            color: rgba(248, 250, 252, 0.95);
        }

        .reason-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted-text);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 12px;
            color: var(--muted-text);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            stroke: var(--cyan-accent);
            opacity: 0.5;
        }

        .app-select-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .app-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(15, 23, 42, 0.4);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .app-checkbox input {
            accent-color: var(--purple-accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>CyberShield</h1>
                    <p>Real-time Protection Engine</p>
                </div>
            </div>
            <div class="status-badge" id="statusPill">
                <div class="status-dot"></div>
                <span>Active</span>
            </div>
        </header>

        <!-- Main Body -->
        <div class="dashboard-grid">
            <!-- Left Side: Simulator and Settings -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <!-- Simulator Control Panel -->
                <div class="card">
                    <div class="card-title">Notification Simulator</div>
                    <div class="input-group">
                        <label for="senderName">Sender Name</label>
                        <input type="text" id="senderName" value="Alex Rivera" placeholder="Enter name...">
                    </div>
                    <div class="input-group">
                        <label for="appSource">Simulated Application</label>
                        <input type="text" id="appSource" value="Instagram" placeholder="e.g. WhatsApp, Instagram...">
                    </div>
                    <div class="input-group">
                        <label for="messageContent">Message Content</label>
                        <textarea id="messageContent" rows="3" placeholder="Type a message (e.g. 'I hate you, you are ugly' to test the classifier)"></textarea>
                    </div>
                    <button class="btn" onclick="simulateAlert()">
                        <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                        Simulate Notification
                    </button>
                </div>

                <!-- Settings Card -->
                <div class="card">
                    <div class="card-title">Guardian Settings</div>
                    <div class="input-group">
                        <label>Guardian Contact Info</label>
                        <input type="text" id="guardName" placeholder="Guardian Name" value="Guardian Parent">
                    </div>
                    <div class="input-group">
                        <input type="tel" id="guardPhone" placeholder="Guardian Phone" value="+1 (555) 019-2834">
                    </div>
                    <div class="input-group">
                        <input type="email" id="guardEmail" placeholder="Guardian Email" value="parent@cybershield.com">
                    </div>
                    
                    <div class="input-group">
                        <label>Detection Sensitivity</label>
                        <div class="sensitivity-toggle">
                            <button class="sens-btn" onclick="setSensitivity('Low')" id="sens-Low">Low</button>
                            <button class="sens-btn active" onclick="setSensitivity('Medium')" id="sens-Medium">Medium</button>
                            <button class="sens-btn" onclick="setSensitivity('High')" id="sens-High">High</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Monitored Applications</label>
                        <div class="app-select-grid">
                            <label class="app-checkbox"><input type="checkbox" checked> WhatsApp</label>
                            <label class="app-checkbox"><input type="checkbox" checked> Instagram</label>
                            <label class="app-checkbox"><input type="checkbox" checked> Snapchat</label>
                            <label class="app-checkbox"><input type="checkbox" checked> SMS (Default)</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Live Dashboard -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <!-- Stats Overview -->
                <div class="stats-grid">
                    <div class="stat-card" style="box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);">
                        <div class="stat-header">
                            <span>Total Scanned</span>
                            <div class="stat-icon" style="background: rgba(6, 182, 212, 0.1); color: var(--cyan-accent);">✉</div>
                        </div>
                        <div class="stat-value" id="scannedCount">127</div>
                    </div>
                    <div class="stat-card" style="box-shadow: 0 0 15px rgba(244, 63, 94, 0.1);">
                        <div class="stat-header">
                            <span>Flagged Incidents</span>
                            <div class="stat-icon" style="background: rgba(244, 63, 94, 0.1); color: var(--rose-accent);">⚠️</div>
                        </div>
                        <div class="stat-value" id="flaggedCount" style="color: var(--rose-accent);">4</div>
                    </div>
                </div>

                <!-- Severity Breakdown -->
                <div class="card">
                    <div class="card-title">Severity Breakdown</div>
                    <div class="severity-bar-container">
                        <div class="severity-bar">
                            <div class="sev-segment sev-critical" id="bar-critical" style="width: 25%;"></div>
                            <div class="sev-segment sev-high" id="bar-high" style="width: 25%;"></div>
                            <div class="sev-segment sev-medium" id="bar-medium" style="width: 25%;"></div>
                            <div class="sev-segment sev-low" id="bar-low" style="width: 25%;"></div>
                        </div>
                        <div class="legend">
                            <div class="legend-item"><div class="dot sev-critical"></div>Critical (<span id="lbl-critical">1</span>)</div>
                            <div class="legend-item"><div class="dot sev-high"></div>High (<span id="lbl-high">1</span>)</div>
                            <div class="legend-item"><div class="dot sev-medium"></div>Medium (<span id="lbl-medium">1</span>)</div>
                            <div class="legend-item"><div class="dot sev-low"></div>Low (<span id="lbl-low">1</span>)</div>
                        </div>
                    </div>
                </div>

                <!-- Activity Log -->
                <div class="card">
                    <div class="log-header">
                        <div class="card-title">Activity Log</div>
                        <div class="clear-btn" onclick="clearLogs()">Clear All</div>
                    </div>
                    <div class="incident-list" id="incidentList">
                        <!-- Items populated dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Logic Script -->
    <script>
        // Initial Mock Data
        let scanned = 0;
        let flagged = 0;
        let sensitivity = 'Medium';

        let incidents = [];

        // Bullying classification database
        const keywords = {
            critical: ["kill yourself", "die", "suicide", "hang yourself"],
            high: ["hate", "worthless", "ugly", "destroy", "harass"],
            medium: ["stupid", "loser", "idiot", "jerk", "fool"],
            low: ["go away", "annoying", "shut up", "dumb"]
        };

        function updateUI() {
            document.getElementById('scannedCount').innerText = scanned;
            document.getElementById('flaggedCount').innerText = flagged;

            // Count severities
            let counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
            incidents.forEach(inc => {
                counts[inc.severity]++;
            });

            // Update Breakdown counts
            document.getElementById('lbl-critical').innerText = counts.CRITICAL;
            document.getElementById('lbl-high').innerText = counts.HIGH;
            document.getElementById('lbl-medium').innerText = counts.MEDIUM;
            document.getElementById('lbl-low').innerText = counts.LOW;

            // Update segments
            let total = incidents.length || 1;
            document.getElementById('bar-critical').style.width = `${(counts.CRITICAL / total) * 100}%`;
            document.getElementById('bar-high').style.width = `${(counts.HIGH / total) * 100}%`;
            document.getElementById('bar-medium').style.width = `${(counts.MEDIUM / total) * 100}%`;
            document.getElementById('bar-low').style.width = `${(counts.LOW / total) * 100}%`;

            // Update Log
            let list = document.getElementById('incidentList');
            if (incidents.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <p>No incidents detected yet. Simulate one above!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = incidents.map(inc => {
                let badgeClass = `badge-${inc.severity.toLowerCase()}`;
                let initials = inc.sender.substring(0, 2).toUpperCase();
                let time = new Date(inc.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                // Color mapping for avatar
                let color = "var(--cyan-accent)";
                if (inc.severity === "CRITICAL") color = "var(--rose-accent)";
                if (inc.severity === "HIGH") color = "var(--amber-accent)";
                if (inc.severity === "MEDIUM") color = "var(--purple-accent)";

                return `
                    <div class="incident-row">
                        <div class="incident-top">
                            <div class="sender-info">
                                <div class="avatar" style="background: rgba(255,255,255,0.05); color: ${color}; border: 1px solid ${color}">${initials}</div>
                                <div>
                                    <div class="sender-name">${inc.sender}</div>
                                    <div class="app-name">${inc.source}</div>
                                </div>
                            </div>
                            <div>
                                <span class="badge ${badgeClass}">${inc.severity}</span>
                                <div class="time-text">${time}</div>
                            </div>
                        </div>
                        <div class="message-box">"${inc.message}"</div>
                        <div class="reason-text">Reason: ${inc.reason}</div>
                    </div>
                `;
            }).join('');
        }

        function simulateAlert() {
            scanned++;
            
            let name = document.getElementById('senderName').value.trim() || "Anonymous";
            let app = document.getElementById('appSource').value.trim() || "WhatsApp";
            let msg = document.getElementById('messageContent').value.trim();

            if (!msg) {
                alert("Please enter message content first!");
                return;
            }

            // Run NLP Heuristics
            let severity = null;
            let reason = "";

            let msgLower = msg.toLowerCase();

            // Check triggers
            if (keywords.critical.some(word => msgLower.includes(word))) {
                severity = "CRITICAL";
                reason = "Detected active self-harm keywords or direct violence threat.";
            } else if (keywords.high.some(word => msgLower.includes(word))) {
                severity = "HIGH";
                reason = "Severe targeted abuse, social exclusion, or harassment words detected.";
            } else if (keywords.medium.some(word => msgLower.includes(word))) {
                severity = "MEDIUM";
                reason = "Derogatory name-calling, moderate insults, or insults detected.";
            } else if (keywords.low.some(word => msgLower.includes(word))) {
                severity = "LOW";
                reason = "Detected soft annoyance, mild isolation, or boundary markers.";
            }

            // Adjust based on sensitivity
            if (sensitivity === 'High' && !severity) {
                // High sensitivity flags minor words
                if (msgLower.split(" ").length > 3) {
                    severity = "LOW";
                    reason = "Flagged due to High Sensitivity setting inspecting general interaction patterns.";
                }
            }

            if (severity) {
                flagged++;
                // Add to list
                incidents.unshift({
                    id: Date.now(),
                    sender: name,
                    source: app,
                    message: msg,
                    severity: severity,
                    reason: reason,
                    timestamp: Date.now()
                });
                
                // Alert simulation UI
                let pill = document.getElementById('statusPill');
                pill.style.background = "rgba(244, 63, 94, 0.15)";
                pill.style.border = "1px solid rgba(244, 63, 94, 0.3)";
                pill.querySelector('span').innerText = "FLAGGED";
                pill.querySelector('span').style.color = "var(--rose-accent)";
                pill.querySelector('.status-dot').style.backgroundColor = "var(--rose-accent)";

                setTimeout(() => {
                    pill.style.background = "rgba(6, 182, 212, 0.1)";
                    pill.style.border = "1px solid rgba(6, 182, 212, 0.2)";
                    pill.querySelector('span').innerText = "ACTIVE";
                    pill.querySelector('span').style.color = "var(--cyan-accent)";
                    pill.querySelector('.status-dot').style.backgroundColor = "var(--cyan-accent)";
                }, 4000);
            }

            document.getElementById('messageContent').value = "";
            updateUI();
        }

        function setSensitivity(level) {
            sensitivity = level;
            document.querySelectorAll('.sens-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`sens-${level}`).classList.add('active');
        }

        function clearLogs() {
            incidents = [];
            flagged = 0;
            updateUI();
        }

        // Initialize on load
        updateUI();
    </script>
</body>
</html>
